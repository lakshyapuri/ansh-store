<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #2ecc71;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 200px;
    }

    button {
      padding: 10px;
      border: none;
      background: #2ecc71;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .order {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .status {
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>📊 Admin Panel - Ansh Store</header>

<div class="container">

  <div id="loginBox">
    <h3>Login</h3>
    <input id="username" placeholder="Username"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
  </div>

  <div id="dashboard" style="display:none;">
    <h3>Orders</h3>
    <div id="orders">Loading...</div>
  </div>

</div>

<script>
async function login() {
  const res = await fetch('/api/admin/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      username: document.getElementById('username').value,
      password: document.getElementById('password').value
    })
  });

  const data = await res.json();

  if(data.success){
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadOrders();
  } else {
    alert("❌ Wrong login");
  }
}

async function loadOrders(){
  const res = await fetch('/api/orders');
  const data = await res.json();

  console.log("Orders:", data); // debug

  if(!data.success || !data.data || data.data.length === 0){
    document.getElementById('orders').innerHTML = "No orders yet ❌";
    return;
  }

  const ordersHTML = data.data.map(order => `
    <div class="order">
      <b>👤 Name:</b> ${order.customerName}<br>
      <b>📞 Phone:</b> ${order.phone}<br>
      <b>📍 Address:</b> ${order.address}<br>
      <b>💰 Total:</b> ₹${order.total}<br>
      <b class="status">📦 Status:</b> ${order.status}<br><br>

      <button onclick="updateStatus('${order.id}', 'Accepted')">✅ Accept</button>
      <button onclick="updateStatus('${order.id}', 'Delivered')">🚚 Deliver</button>
    </div>
  `).join('');

  document.getElementById('orders').innerHTML = ordersHTML;
}

async function updateStatus(id, status) {
  await fetch('/api/orders/' + id, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ status })
  });

  alert("✅ Status updated");
  loadOrders();
}
</script>

</body>
</html>
