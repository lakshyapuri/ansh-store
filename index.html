<script>
/* ============================
   CONFIG
============================ */
const API = 'https://ansh-store.onrender.com/api';

/* ============================
   STATE
============================ */
let cart = JSON.parse(localStorage.getItem('anshCart') || '[]');
let allProducts = [];

/* ============================
   INIT
============================ */
document.addEventListener('DOMContentLoaded', () => {
  loadProducts();
  updateCartUI();
});

/* ============================
   TOAST
============================ */
function showToast(msg, type='success'){
  const t=document.getElementById('toast');
  if(!t) return;
  t.textContent=msg;
  t.className= type==='error' ? 'error show':'show';
  setTimeout(()=>t.classList.remove('show'),3000);
}

/* ============================
   API
============================ */
async function apiGet(path){
  try{
    const res=await fetch(API+path);
    return await res.json();
  }catch{
    showToast("Server error","error");
    return null;
  }
}
async function apiPost(path,body){
  try{
    const res=await fetch(API+path,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    return await res.json();
  }catch{
    showToast("Server error","error");
    return null;
  }
}

/* ============================
   LOAD PRODUCTS
============================ */
async function loadProducts(){
  const res=await apiGet('/products');
  if(res && res.success){
    allProducts=res.data;
    renderProducts();
  }else{
    showToast("No products found","error");
  }
}

/* ============================
   RENDER PRODUCTS
============================ */
function renderProducts(){
  const shopGrid=document.getElementById('shopGrid');
  const featuredGrid=document.getElementById('featuredGrid');

  if(shopGrid){
    shopGrid.innerHTML=allProducts.map(p=>`
      <div class="product-card">
        <div class="img-wrap">
          ${p.image ? `<img src="${p.image}"/>` : `<div class="no-img">📦</div>`}
        </div>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-price">₹${p.price}</div>
          <button class="add-to-cart-btn" onclick="addToCart('${p._id || p.id}')">Add</button>
        </div>
      </div>
    `).join('');
  }

  if(featuredGrid){
    const featured=allProducts.filter(p=>p.featured);
    featuredGrid.innerHTML=featured.map(p=>`
      <div class="product-card">
        <div class="img-wrap">
          ${p.image ? `<img src="${p.image}"/>` : `<div class="no-img">⭐</div>`}
        </div>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-price">₹${p.price}</div>
        </div>
      </div>
    `).join('');
  }
}

/* ============================
   ADD PRODUCT (ADMIN)
============================ */
async function submitProduct(e){
  e.preventDefault();

  const product={
    name:pName.value,
    category:pCat.value,
    price:Number(pPrice.value),
    stock:Number(pStock.value||0),
    description:pDesc.value,
    image:pImageData.value,
    featured:pFeatured.checked
  };

  const res=await apiPost('/products',product);

  if(res && res.success){
    showToast("Product added");
    loadProducts();
    closeModal();
  }
}

/* ============================
   CART
============================ */
function saveCart(){
  localStorage.setItem('anshCart',JSON.stringify(cart));
}

function addToCart(id){
  const p=allProducts.find(x=>x._id===id||x.id===id);
  if(!p) return;

  const ex=cart.find(i=>i.id===id);
  if(ex) ex.qty++;
  else cart.push({id,name:p.name,price:p.price,qty:1});

  saveCart();
  updateCartUI();
  showToast("Added to cart");
}

function updateCartUI(){
  const count=cart.reduce((s,i)=>s+i.qty,0);
  document.querySelectorAll('.cart-count').forEach(el=>el.textContent=count);
}

/* ============================
   ORDER
============================ */
async function placeOrder(){
  const name=cName.value;
  const address=cAddr.value;
  const phone=cPhone.value;

  if(!name||!address||!phone){
    showToast("Fill all fields","error");
    return;
  }

  const order={
    customerName:name,
    address,
    phone,
    items:cart,
    total:cart.reduce((s,i)=>s+i.price*i.qty,0)
  };

  const res=await apiPost('/orders',order);

  if(res && res.success){
    showToast("Order placed");

    cart=[];
    saveCart();
    updateCartUI();

    checkoutContent.innerHTML=`
      <h2>Order Successful</h2>
      <p>Thank you!</p>
    `;
  }
}

/* ============================
   IMAGE UPLOAD
============================ */
function handleImageUpload(e){
  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=()=>{
    pImageData.value=reader.result;
    if(imgPreview){
      imgPreview.src=reader.result;
      imgPreview.classList.remove('hidden');
    }
  };
  reader.readAsDataURL(file);
}
</script>
