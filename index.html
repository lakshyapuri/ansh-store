<script>
/* ============================
   CONFIG (IMPORTANT)
============================ */
const API = 'https://your-render-backend-url.onrender.com/api'; // 🔴 CHANGE THIS

/* ============================
   STATE
============================ */
let cart = JSON.parse(localStorage.getItem('anshCart') || '[]');
let allProducts = [];
let adminToken = sessionStorage.getItem('adminToken') || null;

/* ============================
   INIT
============================ */
document.addEventListener('DOMContentLoaded', () => {
  updateCartUI();
  loadProducts();
});

/* ============================
   TOAST
============================ */
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type === 'error' ? 'error show' : 'show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* ============================
   API HELPERS
============================ */
async function apiGet(path) {
  try {
    const res = await fetch(API + path);
    return await res.json();
  } catch {
    showToast("❌ Server not reachable", "error");
    return null;
  }
}

async function apiPost(path, body) {
  try {
    const res = await fetch(API + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    return await res.json();
  } catch {
    showToast("❌ Failed to connect", "error");
    return null;
  }
}

/* ============================
   PRODUCTS
============================ */
async function loadProducts() {
  const res = await apiGet('/products');
  if (res && res.success) {
    allProducts = res.data;
    renderProducts(allProducts);
  }
}

function renderProducts(products) {
  const grid = document.getElementById('shopGrid');
  if (!grid) return;

  grid.innerHTML = products.map(p => `
    <div class="product-card">
      <div class="card-body">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick="addToCart('${p._id || p.id}')">Add</button>
      </div>
    </div>
  `).join('');
}

/* ============================
   ADD PRODUCT (ADMIN)
============================ */
async function submitProduct(e) {
  e.preventDefault();

  const product = {
    name: document.getElementById('pName').value,
    category: document.getElementById('pCat').value,
    price: Number(document.getElementById('pPrice').value),
    stock: Number(document.getElementById('pStock').value || 0),
    description: document.getElementById('pDesc').value,
    image: document.getElementById('pImageData').value,
    featured: document.getElementById('pFeatured').checked
  };

  const res = await apiPost('/products', product);

  if (res && res.success) {
    showToast("✅ Product Added");
    loadProducts();
    closeModal();
  }
}

/* ============================
   CART
============================ */
function saveCart() {
  localStorage.setItem('anshCart', JSON.stringify(cart));
}

function addToCart(id) {
  const product = allProducts.find(p => p._id === id || p.id === id);
  if (!product) return;

  const exist = cart.find(i => i.id === id);

  if (exist) exist.qty++;
  else {
    cart.push({
      id,
      name: product.name,
      price: product.price,
      qty: 1
    });
  }

  saveCart();
  updateCartUI();
  showToast("🛒 Added to cart");
}

function updateCartUI() {
  const count = cart.reduce((s, i) => s + i.qty, 0);
  document.querySelectorAll('.cart-count').forEach(el => el.textContent = count);
}

/* ============================
   ORDER (TELEGRAM TRIGGER)
============================ */
async function placeOrder() {
  const name = document.getElementById('cName').value;
  const address = document.getElementById('cAddr').value;
  const phone = document.getElementById('cPhone').value;

  if (!name || !address || !phone) {
    showToast("⚠️ Fill all fields", "error");
    return;
  }

  const order = {
    customerName: name,
    address,
    phone,
    items: cart,
    total: cart.reduce((s, i) => s + i.price * i.qty, 0)
  };

  const res = await apiPost('/orders', order);

  if (res && res.success) {
    showToast("✅ Order placed!");

    cart = [];
    saveCart();
    updateCartUI();

    document.getElementById('checkoutContent').innerHTML = `
      <h2>🎉 Order Successful</h2>
      <p>Thank you for ordering!</p>
    `;
  }
}

/* ============================
   IMAGE UPLOAD
============================ */
function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function () {
    document.getElementById('pImageData').value = reader.result;
  };
  reader.readAsDataURL(file);
}
</script>
