<!DOCTYPE html>
<html>
<head>
  <title>Ansh Provisional Store</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #2ecc71;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }

    .products {
      display: flex;
      flex-wrap: wrap;
      padding: 20px;
    }

    .product {
      background: white;
      padding: 15px;
      margin: 10px;
      width: 200px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    button {
      background: #2ecc71;
      border: none;
      padding: 10px;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
      border-radius: 5px;
    }

    #cart {
      position: fixed;
      right: 0;
      top: 0;
      width: 250px;
      height: 100%;
      background: white;
      padding: 10px;
      border-left: 2px solid #ccc;
      overflow-y: auto;
    }
  </style>
</head>

<body>

<header>🛒 Ansh Provisional Store</header>

<div class="products" id="products"></div>

<div id="cart">
  <h3>🧺 Cart</h3>
  <div id="cartItems"></div>
  <h4 id="total">Total: ₹0</h4>
  <button onclick="placeOrder()">Place Order</button>
</div>

<script>
const API = '/api';
let cart = [];

// Load products
async function loadProducts() {
  const res = await fetch(API + '/products');
  const data = await res.json();

  const html = data.data.map(p => `
    <div class="product">
      <h4>${p.name}</h4>
      <p>₹${p.price}</p>
      <button onclick="addToCart('${p.id}', '${p.name}', ${p.price})">Add</button>
    </div>
  `).join('');

  document.getElementById('products').innerHTML = html;
}

// Add to cart
function addToCart(id, name, price) {
  const item = cart.find(i => i.id === id);

  if (item) {
    item.qty++;
  } else {
    cart.push({ id, name, price, qty: 1 });
  }

  renderCart();
}

// Render cart
function renderCart() {
  const html = cart.map(i => `
    <p>${i.name} x${i.qty}</p>
  `).join('');

  const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);

  document.getElementById('cartItems').innerHTML = html;
  document.getElementById('total').innerText = "Total: ₹" + total;
}

// Place order
function placeOrder() {
  if (cart.length === 0) {
    alert("Cart is empty ❌");
    return;
  }

  const customerName = prompt("Enter your name");
  const phone = prompt("Enter phone");
  const address = prompt("Enter address");

  const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);

  fetch(API + '/orders', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      customerName,
      phone,
      address,
      items: cart,
      total
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      alert("✅ Order placed!");
      cart = [];
      renderCart();
    } else {
      alert("❌ Order failed");
    }
  });
}

// Load products on start
loadProducts();
</script>

</body>
</html>
