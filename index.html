<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Title -->
    <title>Ansh Provisional Store 🛒</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Buy groceries online from Ansh Provisional Store. Fast, reliable, and affordable delivery."
    />
    <meta name="theme-color" content="#27ae60" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Custom Styling -->
    <style>
      body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background-color: #f5f7fa;
        color: #2c3e50;
      }

      /* Loading screen */
      #loader {
        position: fixed;
        width: 100%;
        height: 100vh;
        background: #27ae60;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 24px;
        z-index: 9999;
      }
    </style>
  </head>

  <body>
    <!-- No JS fallback -->
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Loader -->
    <div id="loader">Loading Ansh Store...</div>

    <!-- React App Root -->
    <div id="root"></div>

    <!-- Script to remove loader after load -->
    <script>
      window.addEventListener("load", function () {
        const loader = document.getElementById("loader");
        if (loader) {
          loader.style.display = "none";
        }
      });
    </script>
  </body>
</html>
